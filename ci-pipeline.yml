trigger:
  branches:
    include:
      - development

variables:
  BuildConfiguration: 'Release'
  DotNetSdkVersion: 8.x
  NuGetPackages: $(Pipeline.Workspace)/.nuget/packages
  CoverageDir: $(Build.SourcesDirectory)/TestResults/Coverage
  ArtifactDir: $(Build.ArtifactStagingDirectory)
  WebAppArtifact: 'WebAppArtifact'
  azureServiceConnection: 'cstadimod-arm-sc'
  variableGroup: 'Release'
  vmImage: 'ubuntu-latest'

stages:
  - stage: Build
    displayName: 'Build'
    jobs: 
      - job: BuildJob
        displayName: 'Build Job'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
        - task: UseDotNet@2
          displayName: 'Install .NET SDK'
          inputs:
            version: $(DotNetSdkVersion)
            performMultiLevelLookup: true

        - checkout: self
          displayName: 'Checkout Repository'

        - task: DotNetCoreCLI@2
          displayName: 'Restore .NET Tools'
          inputs:
            command: 'custom'
            custom: 'tool'
            arguments: 'restore'

        - task: DotNetCoreCLI@2
          displayName: 'Verify Code Formatting'
          inputs:
            command: 'custom'
            custom: 'format'
            arguments: '--verify-no-changes'

        - task: Cache@2
          displayName: 'NuGet Caching'
          inputs:
            key: 'nuget | "$(Agent.OS)" | **/packages.lock.json,!**/bin/**,!**/obj/**'
            restoreKeys: |
              nuget | "$(Agent.OS)"
              nuget
            path: $(NuGetPackages)
            cacheHitVar: 'CACHE_RESTORED'

        - task: DotNetCoreCLI@2
          displayName: 'Dotnet Restore'
          condition: ne(variables.CACHE_RESTORED, true)
          inputs:
            command: restore
            projects: '**/*.sln'

        - task: DotNetCoreCLI@2
          displayName: 'Build Solution'
          inputs:
            command: build
            projects: '**/*.sln'
            arguments: |
              --configuration $(BuildConfiguration)

        - task: DotNetCoreCLI@2
          displayName: 'Unit Tests'
          inputs:
            command: test
            publishTestResults: true
            testRunTitle: 'Unit Tests'
            projects: '**/*.UnitTests/*.csproj'
            arguments: '--configuration $(BuildConfiguration) /p:CollectCoverage=true /p:CoverletOutputFormat=cobertura /p:CoverletOutput=$(CoverageDir)/'

        - task: DotNetCoreCLI@2
          displayName: 'CodeCoverage Report'
          inputs:
            command: 'custom'
            custom: 'tool'
            arguments: >
              run reportgenerator
              -reports:$(CoverageDir)/coverage.cobertura.xml
              -targetdir:$(CoverageDir)/Report
              -reporttypes:HtmlInline_AzurePipelines

        - task: PublishCodeCoverageResults@2
          displayName: 'Publish Code Coverage Report'
          inputs:
            summaryFileLocation: '$(CoverageDir)/coverage.cobertura.xml'

        - task: DotNetCoreCLI@2
          displayName: 'Build & Deploy artifact'
          inputs:
            command: publish
            publishWebProjects: true
            arguments: |
              --no-restore --configuration $(BuildConfiguration) --output $(ArtifactDir)
            zipAfterPublish: true
            
        - task: PublishPipelineArtifact@1
          displayName: 'Publish Artifact: WebApp'
          condition: succeeded()
          inputs:
            targetPath: '$(ArtifactDir)'
            artifact: 'WebAppArtifact'